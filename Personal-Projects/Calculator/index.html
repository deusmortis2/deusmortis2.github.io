<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vosburgh Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main>
    <div id="Full"><div id="outer">
        <div id="top">
            <div id="header">
                <h1>Mr. V Calculator</h1>
            </div>
            <div id="screen"></div>
        </div>
        <div id="dpad-area">
            <div id="dleft">
                <button id="esc" class="top">esc</button>
                <button id="calc" class="top">calc</button>
                <button id="tab" class="top">tab</button>
            </div>
            <div id="dmiddle">
                <div id="dpad">
                    <!-- d pad image up down left right hotspots -->
                    <div id="dpadholder"></div>
                </div>
            </div>
            <div id="dright">
                <button id="on" class="top">on</button>
                <button id="doc" class="top">doc</button>
                <button id="menu" class="top">menu</button>
            </div>
        </div>
        <div id="numpad">
            <div id="nleft">
                <button id="ctrl" class="top">ctrl</button>
                <button id="equal" class="side">=</button><button id="trig" class="side">trig</button>
                <button id="power" class="side">^</button><button id="square" class="side">x^2</button>
                <button id="invnatlog" class="side">e^x</button><button id="invlog" class="side">10^x</button>
                <button id="leftparen" class="side">(</button><button id="rightparen" class="side">)</button>
            </div>
            <div id="nmiddle">
                <button id="shift" class="top">shift</button><button id="var" class="top">var</button>
                <button id="seven" class="num">7</button><button id="eight" class="num">8</button><button id="nine" class="num">9</button>
                <button id="four" class="num">4</button><button id="five" class="num">5</button><button id="six" class="num">6</button>
                <button id="one" class="num">1</button><button id="two" class="num">2</button><button id="three" class="num">3</button>
                <button id="zero" class="num">0</button><button id="decimal" class="num">.</button><button id="neg" class="num">(-)</button>
            </div>
            <div id="nright">
                <button id="del" class="top">del</button>
                <button id="fraction" class="side">frac</button><button id="book" class="side">book</button>
                <button id="multiply" class="side">x</button><button id="divide" class="side">/</button>
                <button id="add" class="side">+</button><button id="minus" class="side">-</button>
                <button id="enter">enter</button>
            </div>
            
        </div>
        <div id="alpha">
                <div id="aleft">
                    <button id="EE" class="smlside">EE</button>
                    <button id="pi" class="smlside">pi</button>
                    <button id="," class="smlside">,</button>
                </div>
                <div id="amiddle">
                    <button id="a" class="ltr">A</button><button id="b" class="ltr">B</button><button id="c" class="ltr">C</button><button id="d" class="ltr">D</button>
                    <button id="e" class="ltr">E</button><button id="f" class="ltr">F</button><button id="g" class="ltr">G</button>

                    <button id="h" class="ltr">H</button><button id="i" class="ltr">I</button><button id="j" class="ltr">J</button><button id="k" class="ltr">K</button>
                    <button id="l" class="ltr">L</button><button id="m" class="ltr">M</button><button id="n" class="ltr">N</button>

                    <button id="o" class="ltr">O</button><button id="p" class="ltr">P</button><button id="q" class="ltr">Q</button><button id="r" class="ltr">R</button>
                    <button id="s" class="ltr">S</button><button id="t" class="ltr">T</button><button id="u" class="ltr">U</button>

                    <button id="v" class="ltr">V</button><button id="w" class="ltr">W</button>
                    <button id="x" class="ltr">X</button><button id="y" class="ltr">Y</button><button id="z">Z</button>
                    <button id="underscore">_</button>
                    
                </div>
                <div id="aright">
                    <button id="question" class="smlside">?!</button>
                    <button id="flag" class="smlside">flag</button>
                    <button id="return" class="smlside">rtn</button>
                </div>
            </div>


    </div> 
    </div> 
  </main>
  <script src="./scripts/todoAppUsingLocalStorage.js"></script>
</body>

</html>
